<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đặt hàng thành công</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f8fafc;
            font-family: "Segoe UI", Arial, sans-serif;
        }

        .success-wrap {
            padding: 40px 0 60px;
        }

        .success-card {
            border: none;
            border-radius: 22px;
            box-shadow: 0 18px 40px rgba(15, 23, 42, 0.08);
            overflow: hidden;
        }

        .success-header {
            background: linear-gradient(135deg, #16a34a, #22c55e);
            color: white;
            padding: 28px;
        }

        .info-box {
            background: #f8fafc;
            border-radius: 16px;
            padding: 18px;
            border: 1px solid #e2e8f0;
        }

        .table thead th {
            background: #0f172a;
            color: white;
        }

        .btn {
            border-radius: 12px;
        }
    </style>
</head>
<body>
<div class="container success-wrap">
    <div class="row justify-content-center">
        <div class="col-lg-9">
            <div class="card success-card">
                <div class="success-header">
                    <h2 class="fw-bold mb-2">Đặt hàng thành công</h2>
                    <p class="mb-0">Cảm ơn bạn, đơn hàng của bạn đã được ghi nhận</p>
                </div>

                <div class="card-body p-4 p-md-5">
                    <div th:if="${order != null}">
                        <div class="row g-3 mb-4">
                            <div class="col-md-4">
                                <div class="info-box">
                                    <div class="text-muted small">Mã đơn hàng</div>
                                    <div class="fw-bold fs-5" th:text="${order.id}"></div>
                                </div>
                            </div>

                            <div class="col-md-4">
                                <div class="info-box">
                                    <div class="text-muted small">Ngày đặt</div>
                                    <div class="fw-bold" th:text="${order.orderDate}"></div>
                                </div>
                            </div>

                            <div class="col-md-4">
                                <div class="info-box">
                                    <div class="text-muted small">Tổng tiền</div>
                                    <div class="fw-bold fs-5 text-success"
                                         th:text="${#numbers.formatDecimal(order.totalAmount, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"></div>
                                </div>
                            </div>
                        </div>

                        <h4 class="fw-bold mb-3">Chi tiết đơn hàng</h4>

                        <div class="table-responsive">
                            <table class="table align-middle table-bordered">
                                <thead>
                                <tr>
                                    <th>Tên sản phẩm</th>
                                    <th>Giá</th>
                                    <th>Số lượng</th>
                                    <th>Thành tiền</th>
                                </tr>
                                </thead>
                                <tbody>
                                <tr th:each="d : ${order.orderDetails}">
                                    <td class="fw-semibold" th:text="${d.product.name}"></td>
                                    <td th:text="${#numbers.formatDecimal(d.price, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"></td>
                                    <td th:text="${d.quantity}"></td>
                                    <td class="fw-bold text-primary"
                                        th:text="${#numbers.formatDecimal(d.subtotal, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"></td>
                                </tr>
                                </tbody>
                            </table>
                        </div>
                    </div>

                    <div class="mt-4 d-flex gap-2 flex-wrap">
                        <a th:href="@{/products}" class="btn btn-primary px-4">Quay lại sản phẩm</a>
                        <a th:href="@{/cart}" class="btn btn-outline-secondary px-4">Xem giỏ hàng</a>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
