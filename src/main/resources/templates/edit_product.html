<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Cập nhật sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f1f5f9;
            font-family: "Segoe UI", Arial, sans-serif;
        }

        .page-wrap {
            min-height: 100vh;
            display: flex;
            align-items: center;
            padding: 40px 0;
        }

        .form-card {
            border: none;
            border-radius: 22px;
            overflow: hidden;
            box-shadow: 0 18px 40px rgba(15, 23, 42, 0.12);
        }

        .form-header {
            background: linear-gradient(135deg, #1e293b, #0ea5e9);
            color: white;
            padding: 24px 28px;
        }

        .form-control {
            border-radius: 12px;
            padding: 11px 14px;
        }

        .preview-img {
            width: 100%;
            max-height: 220px;
            object-fit: cover;
            border-radius: 14px;
            border: 1px solid #e2e8f0;
            background: #fff;
        }

        .btn {
            border-radius: 12px;
            padding: 10px 16px;
        }
    </style>
</head>
<body>
<div class="container page-wrap">
    <div class="row justify-content-center w-100">
        <div class="col-lg-8">
            <div class="card form-card">
                <div class="form-header">
                    <h3 class="mb-1 fw-bold">Cập nhật sản phẩm</h3>
                    <p class="mb-0 opacity-75">Chỉnh sửa thông tin sản phẩm hiện tại</p>
                </div>

                <div class="card-body p-4">
                    <form th:action="@{'/products/edit/' + ${product.id}}" method="post" th:object="${product}">
                        <div class="row g-4">
                            <div class="col-md-7">
                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Tên sản phẩm</label>
                                    <input type="text" th:field="*{name}" class="form-control" required>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Giá</label>
                                    <input type="number" step="0.01" th:field="*{price}" class="form-control" required>
                                </div>

                                <div class="mb-3">
                                    <label class="form-label fw-semibold">Hình ảnh (URL)</label>
                                    <input type="text" th:field="*{image}" class="form-control">
                                </div>

                                <div class="mb-4">
                                    <label class="form-label fw-semibold">Category</label>
                                    <input type="text" th:field="*{categoryName}" class="form-control">
                                </div>
                            </div>

                            <div class="col-md-5">
                                <label class="form-label fw-semibold">Xem trước ảnh</label>
                                <img th:if="${product.image != null and product.image != ''}" th:src="${product.image}" class="preview-img" alt="preview">
                                <div th:if="${product.image == null or product.image == ''}"
                                     class="preview-img d-flex align-items-center justify-content-center text-muted">
                                    Chưa có ảnh
                                </div>
                            </div>
                        </div>

                        <div class="d-flex gap-2 mt-2">
                            <button type="submit" class="btn btn-primary fw-semibold">Cập nhật</button>
                            <a th:href="@{/products}" class="btn btn-outline-secondary">Quay lại</a>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
