<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <meta charset="UTF-8">
    <title>Danh sách sản phẩm</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background: #f1f5f9;
            font-family: "Segoe UI", Arial, sans-serif;
        }

        .topbar {
            background: linear-gradient(135deg, #0f172a, #1d4ed8);
            color: white;
            padding: 24px 0;
            margin-bottom: 28px;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.15);
        }

        .page-title {
            font-weight: 700;
            margin-bottom: 4px;
        }

        .page-subtitle {
            margin: 0;
            opacity: 0.9;
        }

        .card-custom {
            border: none;
            border-radius: 18px;
            box-shadow: 0 10px 30px rgba(15, 23, 42, 0.08);
        }

        .form-control, .form-select {
            border-radius: 12px;
        }

        .btn {
            border-radius: 12px;
        }

        .table thead th {
            background: #0f172a;
            color: white;
            vertical-align: middle;
        }

        .product-img {
            width: 72px;
            height: 72px;
            object-fit: cover;
            border-radius: 14px;
            border: 1px solid #e2e8f0;
            background: #fff;
        }

        .price-badge {
            background: #eff6ff;
            color: #1d4ed8;
            padding: 6px 10px;
            border-radius: 999px;
            font-weight: 600;
            display: inline-block;
        }

        .category-badge {
            background: #ecfeff;
            color: #0f766e;
            padding: 6px 10px;
            border-radius: 999px;
            font-size: 13px;
            font-weight: 600;
            display: inline-block;
        }

        .action-group {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            align-items: center;
        }

        .pagination-box {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-top: 18px;
        }

        .table td, .table th {
            vertical-align: middle;
        }
    </style>
</head>
<body>

<div class="topbar">
    <div class="container">
        <div class="d-flex flex-column flex-md-row justify-content-between align-items-md-center gap-3">
            <div>
                <h2 class="page-title">Danh sách sản phẩm</h2>
                <p class="page-subtitle">Quản lý, tìm kiếm, lọc và hiển thị sản phẩm</p>
            </div>

            <div class="d-flex gap-2">
                <!-- USER mới thấy giỏ hàng -->
                <a sec:authorize="hasRole('USER')"
                   th:href="@{/cart}"
                   class="btn btn-light fw-semibold">
                    Giỏ hàng
                </a>

                <!-- ADMIN mới thấy thêm sản phẩm -->
                <a sec:authorize="hasRole('ADMIN')"
                   th:href="@{/products/add}"
                   class="btn btn-warning fw-semibold">
                    + Thêm sản phẩm
                </a>
            </div>
        </div>
    </div>
</div>

<div class="container pb-4">
    <div class="card card-custom mb-4">
        <div class="card-body p-4">
            <form th:action="@{/products}" method="get" class="row g-3 align-items-end">
                <div class="col-md-4">
                    <label class="form-label fw-semibold">Tìm theo tên</label>
                    <input type="text" name="keyword" class="form-control"
                           placeholder="Nhập tên sản phẩm..." th:value="${keyword}">
                </div>

                <div class="col-md-3">
                    <label class="form-label fw-semibold">Danh mục</label>
                    <select name="category" class="form-select">
                        <option value="">-- Tất cả category --</option>
                        <option th:each="c : ${categories}"
                                th:value="${c}"
                                th:text="${c}"
                                th:selected="${c == category}">
                        </option>
                    </select>
                </div>

                <div class="col-md-3">
                    <label class="form-label fw-semibold">Sắp xếp</label>
                    <select name="sort" class="form-select">
                        <option value="">-- Chọn kiểu sắp xếp --</option>
                        <option value="price_asc" th:selected="${sort == 'price_asc'}">Giá tăng dần</option>
                        <option value="price_desc" th:selected="${sort == 'price_desc'}">Giá giảm dần</option>
                    </select>
                </div>

                <div class="col-md-2 d-grid">
                    <button type="submit" class="btn btn-primary fw-semibold">Tìm kiếm</button>
                </div>
            </form>
        </div>
    </div>

    <div class="card card-custom">
        <div class="card-body p-4">
            <div class="table-responsive">
                <table class="table align-middle table-hover">
                    <thead>
                    <tr>
                        <th>ID</th>
                        <th>Hình ảnh</th>
                        <th>Tên sản phẩm</th>
                        <th>Giá</th>
                        <th>Category</th>
                        <th width="320">Thao tác</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:if="${#lists.isEmpty(products)}">
                        <td colspan="6" class="text-center text-muted py-4">
                            Không có sản phẩm nào
                        </td>
                    </tr>

                    <tr th:each="p : ${products}">
                        <td th:text="${p.id}"></td>
                        <td>
                            <img th:if="${p.image != null and p.image != ''}"
                                 th:src="${p.image}"
                                 class="product-img"
                                 alt="product">
                            <div th:if="${p.image == null or p.image == ''}"
                                 class="product-img d-flex align-items-center justify-content-center text-muted">
                                No img
                            </div>
                        </td>
                        <td class="fw-semibold" th:text="${p.name}"></td>
                        <td>
                            <span class="price-badge"
                                  th:text="${#numbers.formatDecimal(p.price, 0, 'COMMA', 0, 'POINT')} + ' VNĐ'"></span>
                        </td>
                        <td>
                            <span class="category-badge"
                                  th:text="${p.categoryName != null and p.categoryName != '' ? p.categoryName : 'Chưa có'}"></span>
                        </td>
                        <td>
                            <div class="action-group">

                                <!-- USER: chỉ thêm vào giỏ -->
                                <form sec:authorize="hasRole('USER')"
                                      th:action="@{/cart/add}"
                                      method="post"
                                      class="d-flex gap-2 align-items-center">
                                    <input type="hidden" name="productId" th:value="${p.id}">
                                    <input type="number" name="quantity" value="1" min="1" class="form-control" style="width:80px;">
                                    <button type="submit" class="btn btn-success btn-sm">Add to Cart</button>
                                </form>

                                <!-- ADMIN: chỉ sửa -->
                                <a sec:authorize="hasRole('ADMIN')"
                                   th:href="@{'/products/edit/' + ${p.id}}"
                                   class="btn btn-outline-primary btn-sm">
                                    Sửa
                                </a>

                                <!-- ADMIN: chỉ xóa -->
                                <a sec:authorize="hasRole('ADMIN')"
                                   th:href="@{'/products/delete/' + ${p.id}}"
                                   class="btn btn-outline-danger btn-sm"
                                   onclick="return confirm('Bạn có chắc muốn xóa sản phẩm này?')">
                                    Xóa
                                </a>

                            </div>
                        </td>
                    </tr>
                    </tbody>
                </table>
            </div>

            <div class="pagination-box">
                <a th:if="${currentPage > 0}"
                   th:href="@{/products(page=${currentPage - 1}, keyword=${keyword}, category=${category}, sort=${sort})}"
                   class="btn btn-outline-secondary">
                    ← Previous
                </a>
                <span th:if="${currentPage <= 0}" class="btn btn-outline-secondary disabled">← Previous</span>

                <div class="fw-semibold text-secondary">
                    Trang <span th:text="${currentPage + 1}"></span> / <span th:text="${totalPages}"></span>
                </div>

                <a th:if="${currentPage + 1 < totalPages}"
                   th:href="@{/products(page=${currentPage + 1}, keyword=${keyword}, category=${category}, sort=${sort})}"
                   class="btn btn-outline-secondary">
                    Next →
                </a>
                <span th:if="${currentPage + 1 >= totalPages}" class="btn btn-outline-secondary disabled">Next →</span>
            </div>
        </div>
    </div>
</div>

</body>
</html>
