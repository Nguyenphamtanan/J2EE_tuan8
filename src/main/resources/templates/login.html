<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <title>Đăng nhập hệ thống</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #0f172a, #1e3a8a, #0ea5e9);
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: "Segoe UI", Arial, sans-serif;
        }

        .login-card {
            width: 100%;
            max-width: 420px;
            border: none;
            border-radius: 22px;
            overflow: hidden;
            box-shadow: 0 20px 45px rgba(0, 0, 0, 0.25);
        }

        .login-header {
            background: linear-gradient(135deg, #0f172a, #1d4ed8);
            color: white;
            padding: 28px 24px;
            text-align: center;
        }

        .login-header h2 {
            margin: 0;
            font-weight: 700;
        }

        .login-header p {
            margin: 8px 0 0;
            opacity: 0.9;
            font-size: 14px;
        }

        .card-body {
            padding: 30px 26px;
            background: #ffffff;
        }

        .form-control {
            border-radius: 12px;
            padding: 12px 14px;
        }

        .btn-login {
            border-radius: 12px;
            padding: 12px;
            font-weight: 600;
            background: linear-gradient(135deg, #2563eb, #0ea5e9);
            border: none;
        }

        .btn-login:hover {
            opacity: 0.95;
        }

        .footer-text {
            text-align: center;
            color: #64748b;
            font-size: 13px;
            margin-top: 18px;
        }
    </style>
</head>
<body>
<div class="card login-card">
    <div class="login-header">
        <h2>Đăng nhập</h2>
        <p>Hệ thống quản lý sản phẩm</p>
    </div>

    <div class="card-body">
        <div th:if="${param.error}" class="alert alert-danger rounded-3">
            Sai tài khoản hoặc mật khẩu
        </div>

        <div th:if="${param.logout}" class="alert alert-success rounded-3">
            Bạn đã đăng xuất thành công
        </div>

        <form th:action="@{/login}" method="post">
            <div class="mb-3">
                <label class="form-label fw-semibold">Tên đăng nhập</label>
                <input type="text" name="username" class="form-control" placeholder="Nhập username" required>
            </div>

            <div class="mb-4">
                <label class="form-label fw-semibold">Mật khẩu</label>
                <input type="password" name="password" class="form-control" placeholder="Nhập mật khẩu" required>
            </div>

            <button type="submit" class="btn btn-primary btn-login w-100">
                Đăng nhập
            </button>
        </form>

        <div class="footer-text">
            Spring Boot + Thymeleaf + Security
        </div>
    </div>
</div>
</body>
</html>
