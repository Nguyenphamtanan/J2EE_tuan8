<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8">
  <title>Thêm sản phẩm</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
        background: #f1f5f9;
        font-family: "Segoe UI", Arial, sans-serif;
    }

    .page-wrap {
        min-height: 100vh;
        display: flex;
        align-items: center;
        padding: 40px 0;
    }

    .form-card {
        border: none;
        border-radius: 22px;
        overflow: hidden;
        box-shadow: 0 18px 40px rgba(15, 23, 42, 0.12);
    }

    .form-header {
        background: linear-gradient(135deg, #0f172a, #2563eb);
        color: white;
        padding: 24px 28px;
    }

    .form-control {
        border-radius: 12px;
        padding: 11px 14px;
    }

    .btn {
        border-radius: 12px;
        padding: 10px 16px;
    }
  </style>
</head>
<body>
<div class="container page-wrap">
  <div class="row justify-content-center w-100">
    <div class="col-lg-7">
      <div class="card form-card">
        <div class="form-header">
          <h3 class="mb-1 fw-bold">Thêm sản phẩm mới</h3>
          <p class="mb-0 opacity-75">Nhập đầy đủ thông tin sản phẩm</p>
        </div>

        <div class="card-body p-4">
          <form th:action="@{/products/add}" method="post" th:object="${product}">
            <div class="mb-3">
              <label class="form-label fw-semibold">Tên sản phẩm</label>
              <input type="text" th:field="*{name}" class="form-control" placeholder="Nhập tên sản phẩm" required>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Giá</label>
              <input type="number" step="0.01" th:field="*{price}" class="form-control" placeholder="Nhập giá sản phẩm" required>
            </div>

            <div class="mb-3">
              <label class="form-label fw-semibold">Hình ảnh (URL)</label>
              <input type="text" th:field="*{image}" class="form-control" placeholder="https://...">
            </div>

            <div class="mb-4">
              <label class="form-label fw-semibold">Category</label>
              <input type="text" th:field="*{categoryName}" class="form-control" placeholder="Ví dụ: Điện thoại, Laptop...">
            </div>

            <div class="d-flex gap-2">
              <button type="submit" class="btn btn-success fw-semibold">Lưu sản phẩm</button>
              <a th:href="@{/products}" class="btn btn-outline-secondary">Quay lại</a>
            </div>
          </form>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
